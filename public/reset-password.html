<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Şifre Yenile - randevumhazır</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="customer-body fresha-home-body">
  <main class="container" style="min-height:100vh;display:grid;place-items:center;padding:32px 16px;">
    <section class="modal-card small" style="position:relative;max-width:520px;width:100%;">
      <div class="modal-header">
        <div>
          <div class="eyebrow">randevumhazır</div>
          <h3 class="modal-title">Yeni şifre belirle</h3>
          <p class="muted">Yeni şifren en az 6 karakter olsun.</p>
        </div>
      </div>
      <div class="modal-body">
        <div class="form-stack">
          <div class="field"><label for="newPassword">Yeni şifre</label><input id="newPassword" type="password" placeholder="En az 6 karakter" /></div>
          <div class="field"><label for="newPasswordAgain">Yeni şifre tekrar</label><input id="newPasswordAgain" type="password" placeholder="Tekrar yaz" /></div>
          <button id="resetPasswordBtn" class="button dark full" type="button">Şifreyi yenile</button>
          <p id="resetMessage" class="muted"></p>
        </div>
      </div>
    </section>
  </main>
  <script src="/shared.js"></script>
  <script src="/reset-password.js"></script>
</body>
</html>
